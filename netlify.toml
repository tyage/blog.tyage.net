[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.164.0"

# Preserve legacy article URLs ending in .html.
# This file-based setting overrides the Pretty URLs setting in the Netlify UI.
[build.processing.html]
  pretty_urls = false

# https://fed.brid.gy/docs#redirect+these+URL+paths
[[redirects]]
  from = "/.well-known/host-meta*"
  to = "https://fed.brid.gy/.well-known/host-meta:splat"
  status = 302

[[redirects]]
  from = "/.well-known/webfinger*"
  to = "https://fed.brid.gy/.well-known/webfinger"
  status = 302